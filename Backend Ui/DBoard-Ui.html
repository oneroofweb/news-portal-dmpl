            <div class="sidebar-menu py-3 custom-scrollbar">
                <ul class="nav flex-column">
                    <li class="nav-item px-3 mb-2">

                    </li>
                    <li class="nav-item">
                        <a href="admin.html" class="nav-link"><i class="fas fa-tachometer-alt me-3"></i> Dashboard</a>
                    </li>
                    
                    <li class="nav-item px-3 mt-4 mb-2">

                    <li class="nav-item">

                    <li class="nav-item">

                    <li class="nav-item px-3 mt-4 mb-2">
                        <small class="text-uppercase text-secondary fw-bold" style="font-size: 0.75rem;">Settings</small>
                    </li>
                    <li class="nav-item">
                        <a href="user.html" class="nav-link"><i class="fas fa-users me-3"></i> Users / Staff</a>
                    </li>
                    <li class="nav-item">
                        <a href="setting.html" class="nav-link"><i class="fas fa-cog me-3"></i> Website Setting</a>
                    </li>
                </ul>
            </div>

                    <button class="btn btn-light me-3 shadow-none" id="toggleSidebar">

                    <div class="dropdown">
                        <a href="#" class="d-flex align-items-center text-decoration-none text-dark dropdown-toggle" data-bs-toggle="dropdown">

            <div class="admin-body p-4 p-md-5 flex-grow-1 custom-scrollbar">
                
                fvffd
