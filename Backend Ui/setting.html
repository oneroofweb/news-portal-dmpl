<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMPL Admin - Website Settings</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link href="admin-style.css" rel="stylesheet">
    
    <style>
        
        /* --- Settings Page Premium UI --- */
        .admin-main { background-color: #f4f7fa; }
        
        .card {
            border-radius: 12px;
            border: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03) !important;
        }

        /* --- Tabs Styling --- */
        .nav-tabs { border-bottom: 2px solid #ebeef2; }
        .nav-tabs .nav-link {
            border: none;
            color: #6c757d;
            font-weight: 600;
            padding: 12px 20px;
            transition: all 0.3s ease;
        }
        .nav-tabs .nav-link.active {
            color: #e31e25; /* DMPL Red */
            background: transparent;
            border-bottom: 3px solid #e31e25;
        }

        .form-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
            color: #5e6278;
            margin-bottom: 8px;
        }

        /* --- Logo Preview Box --- */
        .logo-preview {
            width: 150px;
            height: 80px;
            border: 2px dashed #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: #f8fafc;
            overflow: hidden;
        }

        .social-icon-addon {
            width: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f1f5f9;
            border: 1px solid #dee2e6;
            border-right: none;
            border-radius: 8px 0 0 8px;
        }
    </style>
</head>
<body class="bg-light">

    <div class="admin-wrapper d-flex">
        
        <aside class="admin-sidebar bg-dark text-white shadow-sm" id="sidebar">
            <div class="sidebar-header d-flex align-items-center justify-content-between px-4 py-3 border-bottom border-secondary">
                <h3 class="fw-bold m-0 text-white">DMPL <span class="text-danger fs-6">Admin</span></h3>
                <button class="btn btn-link text-white d-md-none p-0" id="closeSidebar">
                    <i class="fas fa-times fs-4"></i>
                </button>
            </div>
            
            <div class="sidebar-menu py-3 custom-scrollbar">
                <ul class="nav flex-column">
                    <li class="nav-item px-3 mb-2">
                        <small class="text-uppercase text-secondary fw-bold" style="font-size: 0.75rem;">Main</small>
                    </li>
                    <li class="nav-item">
                        <a href="admin.html" class="nav-link"><i class="fas fa-tachometer-alt me-3"></i> Dashboard</a>
                    </li>
                    
                    <li class="nav-item px-3 mt-4 mb-2">
                        <small class="text-uppercase text-secondary fw-bold" style="font-size: 0.75rem;">Content</small>
                    </li>
                    <li class="nav-item">
                        <a href="add-new-post.html" class="nav-link"><i class="fas fa-pen-nib me-3"></i> Add New Post</a>
                    </li>
                    <li class="nav-item">
                        <a href="all-post.html" class="nav-link"><i class="fas fa-list me-3"></i> All Posts</a>
                    </li>
                    <li class="nav-item">
                        <a href="categories.html" class="nav-link"><i class="fas fa-layer-group me-3"></i> Category Management</a>
                    </li>

                    <li class="nav-item px-3 mt-4 mb-2">
                        <small class="text-uppercase text-secondary fw-bold" style="font-size: 0.75rem;">Settings</small>
                    </li>
                    <li class="nav-item">
                        <a href="user.html" class="nav-link"><i class="fas fa-users me-3"></i> Users / Staff</a>
                    </li>
                    <li class="nav-item">
                        <a href="setting.html" class="nav-link active"><i class="fas fa-cog me-3"></i> Website Setting</a>
                    </li>
                </ul>
            </div>
        </aside>

        <div class="admin-main flex-grow-1 d-flex flex-column" id="main-content">
            
            <header class="admin-topbar bg-white shadow-sm px-4 py-3 d-flex align-items-center justify-content-between sticky-top">
                <div class="d-flex align-items-center">
                    <button class="btn btn-light me-3 shadow-none" id="toggleSidebar">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h5 class="m-0 fw-bold d-none d-sm-block text-dark">Website Settings</h5>
                </div>
                
                <div class="d-flex align-items-center gap-3">
                    <div class="bg-primary text-white rounded-circle d-flex justify-content-center align-items-center" style="width: 35px; height: 35px;">A</div>
                    <span class="d-none d-md-block fw-medium">Admin</span>
                </div>
            </header>

            <div class="admin-body p-4 p-md-5 flex-grow-1 custom-scrollbar">
                
                <div class="mb-4">
                    <h4 class="fw-bold m-0 text-dark">Website Configuration</h4>
                    <p class="text-muted small m-0 mt-1">Logo, SEO, Social Media aur General settings yahan se badlein.</p>
                </div>

                <div class="card bg-white border-0 shadow-sm">
                    <div class="card-body p-0">
                        <ul class="nav nav-tabs px-4 pt-3" id="settingsTab" role="tablist">
                            <li class="nav-item">
                                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#general" type="button"><i class="fas fa-info-circle me-2"></i> General</button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#seo" type="button"><i class="fas fa-search-plus me-2"></i> SEO Settings</button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#social" type="button"><i class="fas fa-share-alt me-2"></i> Social Links</button>
                            </li>
                        </ul>

                        <div class="tab-content p-4 p-md-5" id="settingsTabContent">
                            
                            <div class="tab-pane fade show active" id="general">
                                <form action="#" id="generalSettingsForm">
                                    <div class="row g-4">
                                        <div class="col-md-6">
                                            <label class="form-label">Website Name</label>
                                            <input type="text" class="form-control shadow-none p-2" value="DMPL News Portal">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Contact Email</label>
                                            <input type="email" class="form-control shadow-none p-2" value="contact@dmpl.com">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Website Logo</label>
                                            <div class="d-flex align-items-center gap-3">
                                                <div class="logo-preview">
                                                    <span class="text-muted small">No Logo</span>
                                                </div>
                                                <input type="file" class="form-control shadow-none">
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Favicon (32x32)</label>
                                            <input type="file" class="form-control shadow-none">
                                        </div>
                                    </div>
                                    <hr class="my-5">
                                    <button class="btn btn-danger px-5 fw-bold shadow-sm">Save Changes</button>
                                </form>
                            </div>

                            <div class="tab-pane fade" id="seo">
                                <form action="#">
                                    <div class="mb-4">
                                        <label class="form-label">Meta Title</label>
                                        <input type="text" class="form-control shadow-none p-2" placeholder="Website main title for Google">
                                    </div>
                                    <div class="mb-4">
                                        <label class="form-label">Meta Keywords</label>
                                        <textarea class="form-control shadow-none" rows="2" placeholder="news, dmpl, basti news, hindi news"></textarea>
                                    </div>
                                    <div class="mb-4">
                                        <label class="form-label">Meta Description</label>
                                        <textarea class="form-control shadow-none" rows="4" placeholder="Briefly describe your website..."></textarea>
                                    </div>
                                    <button class="btn btn-danger px-5 fw-bold shadow-sm">Update SEO</button>
                                </form>
                            </div>

                            <div class="tab-pane fade" id="social">
                                <div class="row g-4">
                                    <div class="col-md-6">
                                        <label class="form-label">Facebook URL</label>
                                        <div class="d-flex">
                                            <div class="social-icon-addon text-primary"><i class="fab fa-facebook-f"></i></div>
                                            <input type="url" class="form-control shadow-none rounded-start-0" placeholder="https://facebook.com/dmpl">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Twitter (X) URL</label>
                                        <div class="d-flex">
                                            <div class="social-icon-addon text-dark"><i class="fab fa-x-twitter"></i></div>
                                            <input type="url" class="form-control shadow-none rounded-start-0" placeholder="https://twitter.com/dmpl">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Instagram URL</label>
                                        <div class="d-flex">
                                            <div class="social-icon-addon text-danger"><i class="fab fa-instagram"></i></div>
                                            <input type="url" class="form-control shadow-none rounded-start-0" placeholder="https://instagram.com/dmpl">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">YouTube Channel</label>
                                        <div class="d-flex">
                                            <div class="social-icon-addon text-danger"><i class="fab fa-youtube"></i></div>
                                            <input type="url" class="form-control shadow-none rounded-start-0" placeholder="https://youtube.com/dmpl">
                                        </div>
                                    </div>
                                </div>
                                <hr class="my-5">
                                <button class="btn btn-danger px-5 fw-bold shadow-sm">Save Social Links</button>
                            </div>

                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin-script.js"></script>
</body>
</html>
